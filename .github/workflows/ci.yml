name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-core:
    name: Verificar Python Core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar 'uv' (Gestor de Python)
        uses: astral-sh/setup-uv@v5
        
      - name: Instalar dependencias del core
        run: uv sync
        working-directory: ./core
        
      - name: Formato y Linting (Ruff)
        run: uv run ruff check .
        working-directory: ./core

      - name: Type Checking (Mypy)
        run: uv run mypy .
        working-directory: ./core

      - name: Ejecutar tests
        run: uv run pytest
        working-directory: ./core

  build-web:
    name: Compilar Dashboard (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5
      
      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json
          
      - name: Instalar dependencias web
        run: npm ci
        working-directory: ./web
        
      - name: Linting (ESLint)
        run: npm run lint
        working-directory: ./web

      - name: Compilar la web (Build)
        run: npm run build
        working-directory: ./web

      - name: Ejecutar tests web (Vitest)
        run: npm test
        working-directory: ./web
